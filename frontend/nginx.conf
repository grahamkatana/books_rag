server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any path that isn't a real file falls back to
    # index.html, so client-side routing (if this ever grows beyond one
    # screen) doesn't 404 on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies to the api service by its Docker Compose service name --
    # mirrors what vite.config.js's dev-server proxy does for local
    # development, just implemented at the nginx level for the
    # containerized production build instead.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (the streaming ask endpoint) need buffering
        # off, or nginx holds the whole response until it's complete --
        # defeating the entire point of streaming.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
