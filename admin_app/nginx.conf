server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any path that isn't a real file falls back to
    # index.html, so a hard refresh on a deep route doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies to the api service by its Docker Compose service name.
    # Adjust "api" below if you give the service a different name in
    # your compose file -- this assumes it's on the same Docker network.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
